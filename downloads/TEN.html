<!DOCTYPE html>
<html>
<head>
  <title>DOM Example</title>
</head>
<body>

  <h2 id="text">Hello</h2>

  <button onclick="changeText()">Click Me</button>

  <script>
    function changeText() {
      document.getElementById("text").textContent = "Text Changed using DOM";
    }
  </script>

</body>
</html>
