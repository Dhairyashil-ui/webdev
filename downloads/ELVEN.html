<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>
</head>
<body>

  <h2>Simple Calculator</h2>

  <script>
    function calculator(num1, num2, operator) {
      let result;

      switch(operator) {
        case '+':
          result = num1 + num2;
          break;

        case '-':
          result = num1 - num2;
          break;

        case '*':
          result = num1 * num2;
          break;

        case '/':
          result = num1 / num2;
          break;

        default:
          result = "Invalid Operator";
      }

      return result;
    }

    // Example usage
    let output = calculator(10, 5, '+');
    document.write("Result: " + output);
  </script>

</body>
</html>
